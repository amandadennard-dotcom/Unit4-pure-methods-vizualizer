<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure or Not? Sorting What You Know</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      background: #ffffff;
      color: #1a1a1a;
      padding: 1.25rem 1.5rem 2rem;
      line-height: 1.5;
    }

    /* ── ARIA live (visually hidden) ── */
    .sr-live {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }

    /* ── Page heading ── */
    .page-heading {
      font-size: 17px;
      font-weight: 700;
      color: #1F1976;
      margin-bottom: 10px;
    }

    /* ── Directions banner ── */
    .directions {
      background: #D5EFFF;
      border-radius: 10px;
      padding: 13px 16px;
      margin-bottom: 1.5rem;
      font-size: 13.5px;
      color: #06338D;
      line-height: 1.6;
    }

    /* ── Method bank ── */
    .bank-label {
      font-size: 11.5px;
      font-weight: 700;
      color: #1F1976;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .method-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 50px;
      padding: 12px;
      border-radius: 10px;
      background: #f5f5f3;
      border: 1.5px dashed #ACA8EA;
      margin-bottom: 1.25rem;
      transition: background 0.2s, border-color 0.2s;
    }

    .method-bank.drag-over {
      background: #E4E2F8;
      border-color: #4C42CF;
    }

    /* ── Drop zones ── */
    .zones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 1rem;
    }

    .zone {
      min-height: 150px;
      border-radius: 10px;
      padding: 14px;
      border: 1.5px dashed #ACA8EA;
      transition: background 0.2s, border-color 0.2s;
    }

    .zone-pure { background: #E4E2F8; border-color: #ACA8EA; }
    .zone-side { background: #FFE3CE; border-color: #FFA868; }

    .zone.drag-over.zone-pure { background: #cdc8f5; border-color: #4C42CF; border-style: solid; }
    .zone.drag-over.zone-side { background: #ffd0a0; border-color: #F46800; border-style: solid; }

    .zone-label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .zone-pure .zone-label { color: #1F1976; }
    .zone-side .zone-label { color: #510000; }

    .zone-items {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 50px;
    }

    /* ── Chips ── */
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 13.5px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-weight: 600;
      cursor: grab;
      background: #ffffff;
      border: 1px solid #ACA8EA;
      color: #1F1976;
      transition: background 0.2s, border-color 0.2s, color 0.2s, opacity 0.2s;
      user-select: none;
    }

    .chip:active   { cursor: grabbing; opacity: 0.65; }
    .chip:focus-visible { outline: 3px solid #4C42CF; outline-offset: 2px; }

    .chip.correct {
      background: #CCF1D0;
      border-color: #7CDB87;
      color: #003F25;
      cursor: default;
    }

    .chip.incorrect {
      background: #FFE3CE;
      border-color: #FFA868;
      color: #510000;
      animation: shake 0.3s ease;
    }

    .chip.locked { cursor: default; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    /* ── Progress bar ── */
    .progress-wrap { margin-bottom: 1rem; }

    .progress-track {
      height: 4px;
      background: #E4E2F8;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4C42CF;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-label {
      font-size: 11.5px;
      color: #ACA8EA;
      margin-top: 4px;
      text-align: right;
    }

    /* ── Bottom row ── */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      flex-wrap: wrap;
      gap: 10px;
    }

    .score-area { font-size: 13px; color: #666; }

    .score-num {
      font-size: 22px;
      font-weight: 700;
      color: #1F1976;
      display: block;
      line-height: 1.2;
    }

    .btn-row { display: flex; gap: 8px; }

    .check-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: #4C42CF;
      color: #fff;
      font-size: 13.5px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .check-btn:hover { background: #1F1976; }
    .check-btn:disabled { opacity: 0.35; cursor: default; }
    .check-btn:focus-visible { outline: 3px solid #ACA8EA; outline-offset: 2px; }

    .reset-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #ACA8EA;
      background: transparent;
      color: #4C42CF;
      font-size: 13.5px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .reset-btn:hover { background: #E4E2F8; }
    .reset-btn:focus-visible { outline: 3px solid #ACA8EA; outline-offset: 2px; }

    /* ── Hints ── */
    .hints { margin-top: 1rem; display: none; }

    .hint-item {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .hint-item.correct-hint { background: #CCF1D0; color: #003F25; border: 1px solid #7CDB87; }
    .hint-item.wrong-hint   { background: #FFE3CE; color: #510000; border: 1px solid #FFA868; }

    .hint-item code {
      font-family: 'Consolas', 'Courier New', monospace;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- ARIA live region -->
  <div id="aria-live" class="sr-live" aria-live="polite" aria-atomic="true"></div>

  <h1 class="page-heading">Pure or Not? Sorting What You Know</h1>

  <div class="directions" role="note" aria-label="Activity directions">
    Drag each method into the correct category — <strong>Pure / non-mutating</strong> or <strong>Has side effects</strong>. Use what you saw in the visualizer to guide you, then check your answers.
  </div>

  <div class="bank-label" id="bank-label">Methods to sort</div>
  <div class="method-bank"
       id="bank"
       role="list"
       aria-labelledby="bank-label"
       ondragover="dragOver(event,'bank')"
       ondragleave="dragLeave(event,'bank')"
       ondrop="drop(event,'bank')">
  </div>

  <div class="progress-wrap" aria-hidden="true">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">0 of 5 placed</div>
  </div>

  <div class="zones" role="group" aria-label="Sorting categories">
    <div class="zone zone-pure"
         id="zone-pure"
         role="list"
         aria-label="Pure or non-mutating methods"
         ondragover="dragOver(event,'zone-pure')"
         ondragleave="dragLeave(event,'zone-pure')"
         ondrop="drop(event,'zone-pure')">
      <div class="zone-label" aria-hidden="true">&#10022; Pure / non-mutating</div>
      <div id="items-zone-pure" style="display:contents"></div>
    </div>
    <div class="zone zone-side"
         id="zone-side"
         role="list"
         aria-label="Methods with side effects"
         ondragover="dragOver(event,'zone-side')"
         ondragleave="dragLeave(event,'zone-side')"
         ondrop="drop(event,'zone-side')">
      <div class="zone-label" aria-hidden="true">&#9889; Has side effects</div>
      <div id="items-zone-side" style="display:contents"></div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="score-area" aria-live="polite">
      <span class="score-num" id="score-display">—</span>
      <span id="score-label">place all methods to check</span>
    </div>
    <div class="btn-row">
      <button class="reset-btn" onclick="reset()">Reset</button>
      <button class="check-btn" id="check-btn" onclick="checkAll()" disabled aria-disabled="true">Check answers</button>
    </div>
  </div>

  <div class="hints" id="hints" role="status" aria-label="Answer feedback"></div>

  <script>
    const METHODS = [
      { id: 'filter',  label: '.filter()',  zone: 'zone-pure', hint: 'Returns a new array — the original is never touched.' },
      { id: 'map',     label: '.map()',     zone: 'zone-pure', hint: 'Transforms each item into a brand new array — pure.' },
      { id: 'forEach', label: '.forEach()', zone: 'zone-side', hint: 'No return value — any change inside it mutates the original.' },
      { id: 'forloop', label: 'for loop',   zone: 'zone-side', hint: 'Writes directly into the original array with opportunities[i] = ...' },
      { id: 'shift',   label: '.shift()',   zone: 'zone-side', hint: 'Removes the first item from the original array in place.' },
    ];

    let placement = {};
    let checked = false;
    const liveRegion = document.getElementById('aria-live');

    function announce(msg) {
      liveRegion.textContent = '';
      setTimeout(() => { liveRegion.textContent = msg; }, 50);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function makeChip(m) {
      const el = document.createElement('div');
      let cls = 'chip';
      if (checked) {
        cls += placement[m.id] === m.zone ? ' correct locked' : ' incorrect locked';
      }
      el.className = cls;
      el.textContent = m.label;
      el.dataset.id = m.id;
      el.draggable = !checked;
      el.setAttribute('role', 'listitem');
      el.setAttribute('aria-label', m.label + (checked
        ? (placement[m.id] === m.zone ? ' — correct' : ' — incorrect')
        : ' — drag to sort'));
      el.ondragstart = e => {
        e.dataTransfer.setData('text/plain', m.id);
        announce('Dragging ' + m.label);
      };
      return el;
    }

    function render() {
      const bank    = document.getElementById('bank');
      const pureBin = document.getElementById('items-zone-pure');
      const sideBin = document.getElementById('items-zone-side');
      bank.innerHTML    = '';
      pureBin.innerHTML = '';
      sideBin.innerHTML = '';

      shuffle(METHODS).forEach(m => {
        const loc  = placement[m.id] || 'bank';
        const chip = makeChip(m);
        if (loc === 'bank')      bank.appendChild(chip);
        else if (loc === 'zone-pure') pureBin.appendChild(chip);
        else                          sideBin.appendChild(chip);
      });

      updateProgress();
    }

    function updateProgress() {
      const placed = Object.keys(placement).length;
      const total  = METHODS.length;
      const pct    = Math.round((placed / total) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = placed + ' of ' + total + ' placed';
      const btn = document.getElementById('check-btn');
      const ready = placed >= total && !checked;
      btn.disabled = !ready;
      btn.setAttribute('aria-disabled', String(!ready));
      if (placed < total) {
        document.getElementById('score-label').textContent = (total - placed) + ' left to place';
      } else if (!checked) {
        document.getElementById('score-label').textContent = 'ready — check your answers!';
      }
    }

    function dragOver(e, id) {
      e.preventDefault();
      document.getElementById(id).classList.add('drag-over');
    }

    function dragLeave(e, id) {
      document.getElementById(id).classList.remove('drag-over');
    }

    function drop(e, id) {
      e.preventDefault();
      document.getElementById(id).classList.remove('drag-over');
      if (checked) return;
      const mid = e.dataTransfer.getData('text/plain');
      if (!mid) return;
      const m = METHODS.find(x => x.id === mid);
      const zoneName = id === 'zone-pure' ? 'Pure / non-mutating' : id === 'zone-side' ? 'Has side effects' : 'the method bank';
      placement[mid] = id;
      announce((m ? m.label : mid) + ' moved to ' + zoneName + '.');
      render();
    }

    function checkAll() {
      if (Object.keys(placement).length < METHODS.length) return;
      checked = true;
      let correct = 0;
      METHODS.forEach(m => { if (placement[m.id] === m.zone) correct++; });
      render();

      const pct = Math.round((correct / METHODS.length) * 100);
      const msg =
        pct === 100 ? 'perfect — you know your methods!' :
        pct >= 60   ? 'nice work — review the hints below' :
                      'keep going — the hints below will help';
      document.getElementById('score-display').textContent = correct + ' / ' + METHODS.length;
      document.getElementById('score-label').textContent = msg;
      document.getElementById('check-btn').disabled = true;

      showHints(correct);
      announce('Answers checked. You got ' + correct + ' out of ' + METHODS.length + ' correct. ' + msg);
    }

    function showHints(correct) {
      const el = document.getElementById('hints');
      el.style.display = 'block';

      if (correct === METHODS.length) {
        el.innerHTML = '<div class="hint-item correct-hint">All correct! Pure functions return new data and leave the original alone. Side effects change something outside the function.</div>';
        return;
      }

      const wrong = METHODS.filter(m => placement[m.id] !== m.zone);
      const right  = METHODS.filter(m => placement[m.id] === m.zone);
      let html = '';
      wrong.forEach(m => {
        html += `<div class="hint-item wrong-hint"><code>${m.label}</code> — ${m.hint}</div>`;
      });
      if (right.length > 0 && wrong.length > 0) {
        html += `<div class="hint-item correct-hint">You got <strong>${right.map(m => m.label).join(', ')}</strong> correct.</div>`;
      }
      el.innerHTML = html;
    }

    function reset() {
      placement = {};
      checked   = false;
      document.getElementById('score-display').textContent = '—';
      document.getElementById('score-label').textContent = 'place all methods to check';
      document.getElementById('hints').style.display = 'none';
      document.getElementById('hints').innerHTML = '';
      document.getElementById('progress-fill').style.width = '0%';
      render();
      announce('Activity reset. All methods returned to the bank.');
    }

    render();
  </script>
</body>
</html>
